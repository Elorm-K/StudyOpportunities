<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nity — your study-abroad advisor</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#1c2430; --muted:#5b6b7c;
    --line:#dde3ea; --accent:#2f5fe0; --accent-weak:#eaf0ff;
    --err:#c0392b; --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:20px 18px 130px}
  .chathead{display:flex;align-items:center;gap:12px;padding:6px 4px 14px}
  .avatar{width:42px;height:42px;border-radius:50%;background:var(--accent-weak);
    display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
  .chathead h1{font-size:1.05rem;margin:0}
  .chathead .sub{color:var(--muted);font-size:.85rem;margin:0}

  .thread{display:flex;flex-direction:column;gap:10px}
  .row{display:flex;gap:10px;align-items:flex-end;max-width:88%}
  .row.user{align-self:flex-end;flex-direction:row-reverse}
  .row .av{width:30px;height:30px;border-radius:50%;background:var(--accent-weak);
    display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
  .bubble{background:var(--card);border:1px solid var(--line);border-radius:14px;
    border-bottom-left-radius:4px;padding:11px 14px;box-shadow:0 1px 2px rgba(20,30,45,.04);
    animation:pop .25s ease-out;white-space:pre-wrap}
  .row.user .bubble{background:var(--accent);color:#fff;border-color:var(--accent);
    border-bottom-left-radius:14px;border-bottom-right-radius:4px;white-space:pre-wrap}
  .bubble.tip{background:var(--accent-weak);border-color:#d4e0ff}
  .bubble.progress{font-weight:600}
  .bubble .lead{display:block;font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-bottom:3px}
  .bubble.err{border-color:var(--err);color:var(--err)}
  .bubble a{color:var(--accent)}
  .row.user .bubble a{color:#fff;text-decoration:underline}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .typing{display:inline-flex;gap:4px;padding:13px 14px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#b7c2d0;animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

  /* composer */
  .composer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);
    border-top:1px solid var(--line);padding:12px 18px}
  .composer .inner{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  .composer textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;font:16px/1.4 system-ui;min-height:48px;max-height:140px;background:#fff}
  .composer button{appearance:none;border:0;border-radius:12px;background:var(--accent);color:#fff;
    font:600 15px/1 system-ui;padding:0 20px;height:48px;cursor:pointer}
  .composer button:disabled{opacity:.5;cursor:default}

  .btn{display:inline-block;margin-top:10px;appearance:none;border:0;border-radius:10px;
    background:var(--accent);color:#fff;font:600 15px/1 system-ui;padding:13px 22px;cursor:pointer;text-decoration:none}
  .meta{color:var(--muted);font-size:.8rem;text-align:center;margin-top:16px}

  .dlbar{margin:4px 0 16px;text-align:right}
  .dlbar .btn{margin-top:0}
  .report{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:24px 26px;margin:6px 0;box-shadow:0 1px 2px rgba(20,30,45,.04)}
  .report h1{font-size:1.5rem;margin:.2em 0 .5em}
  .report h2{font-size:1.2rem;margin:1.3em 0 .4em;border-bottom:1px solid var(--line);padding-bottom:4px}
  .report h3{font-size:1.05rem;margin:1.1em 0 .3em}
  .report p{margin:.6em 0}
  .report ul,.report ol{margin:.5em 0 .8em;padding-left:1.4em}
  .report li{margin:.25em 0}
  .report code{background:#f0f2f5;border-radius:5px;padding:1px 5px;font-size:.92em;font-family:ui-monospace,Menlo,monospace}
  .report blockquote{border-left:3px solid var(--line);margin:.6em 0;padding:.2em 0 .2em 14px;color:var(--muted)}
  .report a{color:var(--accent)}
  .report hr{border:0;border-top:1px solid var(--line);margin:1.4em 0}
  .tablewrap{overflow-x:auto;margin:.8em 0}
  .report table{border-collapse:collapse;width:100%;font-size:.94rem}
  .report th,.report td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
  .report th{background:var(--accent-weak)}

  /* research status card + tips carousel (stays in place — does not lengthen the page) */
  .statuscard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;margin:8px 0;box-shadow:0 1px 2px rgba(20,30,45,.04)}
  .statusline{display:flex;align-items:center;gap:10px;font-weight:600;color:var(--ink)}
  .spin{width:16px;height:16px;border:2px solid var(--accent-weak);border-top-color:var(--accent);
    border-radius:50%;flex:0 0 auto;animation:spin 0.9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .carousel{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .carousel .lead{display:block;font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-bottom:6px}
  .carousel .viewport{position:relative;min-height:66px}
  .carousel .slide{position:absolute;inset:0;opacity:0;transition:opacity .4s ease;
    background:var(--accent-weak);border:1px solid #d4e0ff;border-radius:10px;padding:12px 14px;
    pointer-events:none}
  .carousel .slide.active{opacity:1;pointer-events:auto;position:relative}
  .carousel .nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px}
  .carousel .arrow{appearance:none;border:1px solid var(--line);background:#fff;color:var(--accent);
    width:30px;height:30px;border-radius:50%;font-size:18px;line-height:1;cursor:pointer}
  .carousel .arrow:hover{background:var(--accent-weak)}
  .carousel .dots{display:flex;gap:6px}
  .carousel .dot{width:7px;height:7px;border-radius:50%;background:#c4cedb;cursor:pointer;border:0;padding:0}
  .carousel .dot.on{background:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div class="chathead">
    <div class="avatar">🎓</div>
    <div>
      <h1>nity</h1>
      <p class="sub" id="sub">Let's build your study-abroad plan.</p>
    </div>
  </div>
  <div class="thread" id="thread"></div>
  <div class="meta" id="meta"></div>
</div>
<div class="composer" id="composer">
  <div class="inner">
    <textarea id="input" placeholder="Type your reply…" rows="1" autofocus></textarea>
    <button id="send">Send</button>
  </div>
</div>
<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  var thread = $('thread');

  // ===== conversation state (held client-side; server is stateless per turn) =====
  var messages = [];   // {role:'user'|'assistant', content:'text'} — visible transcript
  var profile = {};    // accumulating partial profile
  var phase = 'intake';
  var pollTimer = null;

  // ===== markdown renderer (final report) =====
  function esc(s){ return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  function inline(s){
    s = esc(s);
    s = s.replace(/`([^`]+)`/g,function(_,c){return '<code>'+c+'</code>';});
    s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    return s;
  }
  function renderTable(rows){
    function cells(line){ return line.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(function(c){return c.trim();}); }
    var head = cells(rows[0]);
    var out = '<div class="tablewrap"><table><thead><tr>';
    head.forEach(function(h){ out += '<th>'+inline(h)+'</th>'; });
    out += '</tr></thead><tbody>';
    for(var i=2;i<rows.length;i++){ out += '<tr>'; cells(rows[i]).forEach(function(c){ out += '<td>'+inline(c)+'</td>'; }); out += '</tr>'; }
    return out + '</tbody></table></div>';
  }
  function md(text){
    var lines = text.replace(/\r\n/g,'\n').split('\n'); var out=[], i=0;
    function isSep(l){ return /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(l) && /-/.test(l); }
    while(i<lines.length){
      var line=lines[i];
      if(/^\s*$/.test(line)){ i++; continue; }
      if(/^\s*\|.*\|\s*$/.test(line) && i+1<lines.length && isSep(lines[i+1])){
        var tbl=[line,lines[i+1]]; i+=2;
        while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ tbl.push(lines[i]); i++; }
        out.push(renderTable(tbl)); continue;
      }
      var h=line.match(/^(#{1,4})\s+(.*)$/);
      if(h){ out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>'); i++; continue; }
      if(/^\s*(---|\*\*\*|___)\s*$/.test(line)){ out.push('<hr>'); i++; continue; }
      if(/^\s*>\s?/.test(line)){ var bq=[]; while(i<lines.length && /^\s*>\s?/.test(lines[i])){ bq.push(lines[i].replace(/^\s*>\s?/,'')); i++; } out.push('<blockquote>'+inline(bq.join(' '))+'</blockquote>'); continue; }
      if(/^\s*[-*+]\s+/.test(line)){ var ul=[]; while(i<lines.length && /^\s*[-*+]\s+/.test(lines[i])){ ul.push(inline(lines[i].replace(/^\s*[-*+]\s+/,''))); i++; } out.push('<ul>'+ul.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul>'); continue; }
      if(/^\s*\d+\.\s+/.test(line)){ var ol=[]; while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ ol.push(inline(lines[i].replace(/^\s*\d+\.\s+/,''))); i++; } out.push('<ol>'+ol.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ol>'); continue; }
      var para=[line]; i++;
      while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^\s*(#{1,4}\s|[-*+]\s|\d+\.\s|>|\|)/.test(lines[i])){ para.push(lines[i]); i++; }
      out.push('<p>'+inline(para.join(' '))+'</p>');
    }
    return out.join('\n');
  }

  // ===== chat helpers =====
  function scrollDown(){ window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'}); }
  function addBubble(html, cls, who){
    var row = document.createElement('div');
    row.className = 'row' + (who==='user'?' user':'');
    var av = who==='user' ? '' : '<div class="av">🎓</div>';
    row.innerHTML = av + '<div class="bubble '+(cls||'')+'">'+html+'</div>';
    thread.appendChild(row); scrollDown(); return row;
  }
  var typingRow = null;
  function showTyping(){ if(typingRow) return;
    typingRow = document.createElement('div'); typingRow.className='row';
    typingRow.innerHTML = '<div class="av">🎓</div><div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>';
    thread.appendChild(typingRow); scrollDown();
  }
  function hideTyping(){ if(typingRow){ thread.removeChild(typingRow); typingRow=null; } }

  // ===== intake phase =====
  var GREETING = "Hi! I'm nity 🎓 — I'll put together a personalised university and scholarship plan for you. To start: what's your first name, and which country are you applying from?";
  addBubble(inline(GREETING));
  messages.push({role:'assistant', content:GREETING});

  var input = $('input'), sendBtn = $('send');
  function setComposerEnabled(on){ input.disabled=!on; sendBtn.disabled=!on; if(on){ input.focus(); } }

  function send(){
    var text = input.value.trim();
    if(!text || input.disabled) return;
    input.value=''; input.style.height='auto';
    addBubble(inline(text), '', 'user');
    messages.push({role:'user', content:text});
    setComposerEnabled(false);
    showTyping();
    fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({messages:messages, profile:profile})})
      .then(function(r){ if(!r.ok) throw new Error('chat unavailable'); return r.json(); })
      .then(function(j){
        hideTyping();
        profile = j.profile || profile;
        if(j.reply){ addBubble(inline(j.reply)); messages.push({role:'assistant', content:j.reply}); }
        if(j.done && j.slug){ startResearch(j.slug); }
        else { setComposerEnabled(true); }
      })
      .catch(function(e){
        hideTyping();
        addBubble(inline("Sorry — I hit a problem. You can also use the "+
          "<a href='/form'>quick form</a> instead."), 'err');
        setComposerEnabled(true);
      });
  }
  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
  input.addEventListener('input', function(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,140)+'px'; });

  // ===== research phase (scripted wait + report in-thread) =====
  var PROGRESS = [
    'Mapping your grades onto the UK / US scale…',
    'Shortlisting universities that offer your field at your level…',
    'Scoring each by admission odds × funding for international students…',
    'Finding scholarships you’re genuinely eligible for…',
    'Checking deadlines, tests, and visa timelines…',
    'Writing up your personalised plan with sources for every figure…'
  ];
  var TIPS = [
    'UK master’s schools rarely fund international students directly — a portable award like **Chevening** or **Commonwealth** is usually the real route to full funding.',
    'For US **PhDs**, funding is the norm: most STEM doctoral offers include a full tuition waiver + stipend, regardless of nationality.',
    'A US **master’s** is usually self-funded for internationals — plan for limited aid and chase assistantships once enrolled.',
    '**Chevening** asks you to apply to 3 UK courses and hold an offer — start your applications early, in parallel.',
    'Need-blind admission for internationals is rare in the US — only a handful (MIT, Princeton, Yale, Harvard, Amherst) meet full need.',
    'UK admissions are requirement-based: hitting the entry grade (often a **2:1**) matters more than any “acceptance rate”.',
    'Build a balanced list — reach, target, and safety. Applying only to ultra-selective schools is the most common mistake.',
    'Sit your English test (IELTS/TOEFL) early — many scholarships need the score before their deadline.',
    'Line up transcripts and reference letters months ahead — they’re the slowest part of any application.',
    'For Commonwealth scholarships you usually apply through a **Nominating Agency** in your country — find yours early.',
    'Apply for your student visa as soon as you have an unconditional offer + confirmed funding.',
    'Mastercard Foundation Scholars fully funds African students at partner universities — worth a look if you’re from Ghana or Nigeria.'
  ];
  // The waiting UI is ONE status card that stays in place: a rotating progress line + a tips
  // carousel. Tips cycle within the carousel instead of dripping down and lengthening the page.
  var carousel = null;  // {root, slides, dots, show, timer, idx}
  function buildStatusCard(){
    var card = document.createElement('div'); card.className = 'statuscard';
    var pline = '<div class="statusline"><span class="spin"></span><span id="progresstext">'+inline(PROGRESS[0])+'</span></div>';
    var slides = TIPS.map(function(t,i){ return '<div class="slide'+(i===0?' active':'')+'">'+inline(t)+'</div>'; }).join('');
    var dots = TIPS.map(function(_,i){ return '<button class="dot'+(i===0?' on':'')+'" data-i="'+i+'" aria-label="Tip '+(i+1)+'"></button>'; }).join('');
    card.innerHTML = pline +
      '<div class="carousel"><span class="lead">While you wait — tips</span>' +
      '<div class="viewport">'+slides+'</div>' +
      '<div class="nav"><button class="arrow" id="cprev" aria-label="Previous tip">‹</button>' +
      '<div class="dots">'+dots+'</div>' +
      '<button class="arrow" id="cnext" aria-label="Next tip">›</button></div></div>';
    thread.appendChild(card); scrollDown();

    var slideEls = card.querySelectorAll('.slide');
    var dotEls = card.querySelectorAll('.dot');
    var idx = 0;
    function show(i){
      idx = (i + slideEls.length) % slideEls.length;
      for(var k=0;k<slideEls.length;k++){ slideEls[k].classList.toggle('active', k===idx); dotEls[k].classList.toggle('on', k===idx); }
    }
    var auto = null;
    function restart(){ if(auto) clearInterval(auto); auto = setInterval(function(){ show(idx+1); }, 7000); }
    card.querySelector('#cprev').addEventListener('click', function(){ show(idx-1); restart(); });
    card.querySelector('#cnext').addEventListener('click', function(){ show(idx+1); restart(); });
    for(var d=0; d<dotEls.length; d++){ (function(el){ el.addEventListener('click', function(){ show(+el.getAttribute('data-i')); restart(); }); })(dotEls[d]); }
    restart();

    // rotate the progress line in place through the PROGRESS steps
    var pIdx = 0, ptext = card.querySelector('#progresstext');
    var ptimer = setInterval(function(){ pIdx = (pIdx+1) % PROGRESS.length; ptext.innerHTML = inline(PROGRESS[pIdx]); }, 5000);

    carousel = {root:card, stop:function(){ if(auto) clearInterval(auto); if(ptimer) clearInterval(ptimer); }};
  }
  function startStatus(){ if(!carousel) buildStatusCard(); }
  function stopStatus(){ if(carousel){ carousel.stop(); if(carousel.root && carousel.root.parentNode){ carousel.root.parentNode.removeChild(carousel.root); } carousel=null; } }

  var reportShown=false;
  function showReport(markdown, slug){
    if(reportShown) return; reportShown=true; stopStatus();
    $('sub').textContent='Your plan is ready.';
    addBubble('🎉 <strong>Your personalised study-abroad plan is ready.</strong> Every figure is cited, and you can download it as a Word document.', 'progress');
    var card=document.createElement('div'); card.className='report';
    card.innerHTML = '<div class="dlbar"><a class="btn" href="/api/clients/'+slug+'/report.docx">⬇ Download as Word document (.docx)</a></div>' + md(markdown);
    thread.appendChild(card); scrollDown();
  }

  function startResearch(slug){
    phase='research';
    $('composer').style.display='none';
    $('sub').textContent='Researching your options…';
    startStatus();
    function poll(){
      fetch('/api/clients/'+slug+'/status').then(function(r){ if(!r.ok) throw new Error('status'); return r.json(); })
      .then(function(st){
        if(st.state==='done'){
          fetch('/api/clients/'+slug+'/report').then(function(r){ if(!r.ok) throw new Error('report'); return r.json(); })
            .then(function(j){ showReport(j.markdown, slug); if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } })
            .catch(function(){});
        } else if(st.state==='error'){
          stopStatus(); if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
          $('sub').textContent='Something went wrong.';
          addBubble(inline(st.message || st.error || 'Something went wrong. Please contact us.'), 'err');
        }
        // running_research / awaiting_approval: keep the status card up
      }).catch(function(){});
    }
    poll(); pollTimer=setInterval(poll, 4000);
  }
})();
</script>
</body>
</html>
