<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your study-abroad plan</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#1c2430; --muted:#5b6b7c;
    --line:#dde3ea; --accent:#2f5fe0; --accent-weak:#eaf0ff;
    --err:#c0392b; --ok:#1e7a46; --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:28px 18px 96px}
  .status{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;margin:16px 0;box-shadow:0 1px 2px rgba(20,30,45,.04);text-align:center}
  .spinner{width:30px;height:30px;border:3px solid var(--accent-weak);border-top-color:var(--accent);
    border-radius:50%;margin:6px auto 14px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .status h2{margin:0 0 6px;font-size:1.2rem}
  .status p{color:var(--muted);margin:0}
  .btn{display:inline-block;margin-top:14px;appearance:none;border:0;border-radius:10px;
    background:var(--accent);color:#fff;font:600 15px/1 system-ui;padding:13px 22px;cursor:pointer;text-decoration:none}
  .err{color:var(--err)}
  .dlbar{margin:0 0 18px;text-align:right}
  .dlbar .btn{margin-top:0}
  .report{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:28px 30px;margin:16px 0;box-shadow:0 1px 2px rgba(20,30,45,.04)}
  .report h1{font-size:1.6rem;margin:.2em 0 .5em}
  .report h2{font-size:1.25rem;margin:1.3em 0 .4em;border-bottom:1px solid var(--line);padding-bottom:4px}
  .report h3{font-size:1.08rem;margin:1.1em 0 .3em}
  .report p{margin:.6em 0}
  .report ul,.report ol{margin:.5em 0 .8em;padding-left:1.4em}
  .report li{margin:.25em 0}
  .report code{background:#f0f2f5;border-radius:5px;padding:1px 5px;font-size:.92em;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .report blockquote{border-left:3px solid var(--line);margin:.6em 0;padding:.2em 0 .2em 14px;color:var(--muted)}
  .report a{color:var(--accent)}
  .report hr{border:0;border-top:1px solid var(--line);margin:1.4em 0}
  .tablewrap{overflow-x:auto;margin:.8em 0}
  .report table{border-collapse:collapse;width:100%;font-size:.94rem}
  .report th,.report td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
  .report th{background:var(--accent-weak)}
  .meta{color:var(--muted);font-size:.85rem;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="status" id="status">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Working…</h2>
    <p id="msg">Checking your status…</p>
    <div id="cta"></div>
  </div>
  <div class="report" id="report" style="display:none"></div>
  <div class="meta" id="meta"></div>
</div>
<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  var parts = location.pathname.split('/').filter(Boolean); // clients / <slug> / results
  var slug = parts[1];
  var timer = null;

  // ---- minimal, dependency-free markdown renderer ----
  function esc(s){ return String(s).replace(/[&<>]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
  function inline(s){
    s = esc(s);
    s = s.replace(/`([^`]+)`/g, function(_,c){ return '<code>'+c+'</code>'; });
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return s;
  }
  function renderTable(rows){
    // rows: array of raw "| a | b |" lines (header, separator, body...)
    function cells(line){
      return line.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(function(c){return c.trim();});
    }
    var head = cells(rows[0]);
    var out = '<div class="tablewrap"><table><thead><tr>';
    head.forEach(function(h){ out += '<th>'+inline(h)+'</th>'; });
    out += '</tr></thead><tbody>';
    for(var i=2;i<rows.length;i++){
      out += '<tr>';
      cells(rows[i]).forEach(function(c){ out += '<td>'+inline(c)+'</td>'; });
      out += '</tr>';
    }
    return out + '</tbody></table></div>';
  }
  function md(text){
    var lines = text.replace(/\r\n/g,'\n').split('\n');
    var out = [], i = 0;
    function isTableSep(l){ return /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(l) && /-/.test(l); }
    while(i < lines.length){
      var line = lines[i];
      if(/^\s*$/.test(line)){ i++; continue; }
      // table
      if(/^\s*\|.*\|\s*$/.test(line) && i+1 < lines.length && isTableSep(lines[i+1])){
        var tbl = [line, lines[i+1]]; i += 2;
        while(i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ tbl.push(lines[i]); i++; }
        out.push(renderTable(tbl)); continue;
      }
      // heading
      var h = line.match(/^(#{1,4})\s+(.*)$/);
      if(h){ out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>'); i++; continue; }
      // hr
      if(/^\s*(---|\*\*\*|___)\s*$/.test(line)){ out.push('<hr>'); i++; continue; }
      // blockquote
      if(/^\s*>\s?/.test(line)){
        var bq = [];
        while(i < lines.length && /^\s*>\s?/.test(lines[i])){ bq.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
        out.push('<blockquote>'+inline(bq.join(' '))+'</blockquote>'); continue;
      }
      // unordered list
      if(/^\s*[-*+]\s+/.test(line)){
        var ul = [];
        while(i < lines.length && /^\s*[-*+]\s+/.test(lines[i])){ ul.push(inline(lines[i].replace(/^\s*[-*+]\s+/,''))); i++; }
        out.push('<ul>'+ul.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul>'); continue;
      }
      // ordered list
      if(/^\s*\d+\.\s+/.test(line)){
        var ol = [];
        while(i < lines.length && /^\s*\d+\.\s+/.test(lines[i])){ ol.push(inline(lines[i].replace(/^\s*\d+\.\s+/,''))); i++; }
        out.push('<ol>'+ol.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ol>'); continue;
      }
      // paragraph (gather until blank)
      var para = [line]; i++;
      while(i < lines.length && !/^\s*$/.test(lines[i]) &&
            !/^\s*(#{1,4}\s|[-*+]\s|\d+\.\s|>|\|)/.test(lines[i])){ para.push(lines[i]); i++; }
      out.push('<p>'+inline(para.join(' '))+'</p>');
    }
    return out.join('\n');
  }

  function showReport(markdown){
    if(timer){ clearInterval(timer); timer = null; }
    $('status').style.display = 'none';
    var r = $('report');
    var bar = '<div class="dlbar"><a class="btn" href="/api/clients/' + slug +
      '/report.docx">⬇ Download as Word document (.docx)</a></div>';
    r.innerHTML = bar + md(markdown);
    r.style.display = 'block';
  }

  function setStatus(opts){
    $('spinner').style.display = opts.spin ? 'block' : 'none';
    $('title').textContent = opts.title;
    $('title').className = opts.error ? 'err' : '';
    $('msg').textContent = opts.msg || '';
    $('cta').innerHTML = '';
    if(opts.cta){
      var a = document.createElement('a');
      a.className = 'btn'; a.href = opts.cta.href; a.textContent = opts.cta.label;
      $('cta').appendChild(a);
    }
  }

  function poll(){
    fetch('/api/clients/' + slug + '/status').then(function(r){
      if(!r.ok) throw new Error('status unavailable'); return r.json();
    }).then(function(st){
      if(typeof st.cost_usd === 'number'){ $('meta').textContent = 'run cost so far: $' + st.cost_usd.toFixed(2); }
      switch(st.state){
        case 'queued':
        case 'running_intake':
          setStatus({spin:true, title:'Reviewing your answers…', msg: st.message}); break;
        case 'awaiting_answers':
          setStatus({spin:false, title:'A couple of quick questions', msg: st.message,
            cta:{href:'/clients/'+slug+'/questions', label:'Answer the questions →'}}); break;
        case 'running_research':
          setStatus({spin:true, title:'Researching your options…',
            msg: st.message || 'Matching universities, scholarships, and building your plan. This can take a few minutes.'}); break;
        case 'awaiting_approval':
          setStatus({spin:true, title:'Almost there', msg: st.message || 'Your report is being reviewed before release.'}); break;
        case 'done':
          fetch('/api/clients/' + slug + '/report').then(function(r){
            if(!r.ok) throw new Error('report not ready'); return r.json();
          }).then(function(j){ showReport(j.markdown); }).catch(function(){
            setStatus({spin:true, title:'Finishing up…', msg:'Your report is being prepared.'});
          });
          break;
        case 'error':
          if(timer){ clearInterval(timer); timer = null; }
          setStatus({spin:false, error:true, title:'Something went wrong',
            msg: st.message || st.error || 'Please contact us and we will look into it.'}); break;
        default:
          setStatus({spin:true, title:'Working…', msg: st.message || ''});
      }
    }).catch(function(e){
      setStatus({spin:false, error:true, title:'We can’t find this request', msg:e.message});
      if(timer){ clearInterval(timer); timer = null; }
    });
  }

  poll();
  timer = setInterval(poll, 4000);
})();
</script>
</body>
</html>
