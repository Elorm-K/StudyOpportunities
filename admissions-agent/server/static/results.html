<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your study-abroad plan</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#1c2430; --muted:#5b6b7c;
    --line:#dde3ea; --accent:#2f5fe0; --accent-weak:#eaf0ff;
    --err:#c0392b; --ok:#1e7a46; --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:20px 18px 96px}

  /* header */
  .chathead{display:flex;align-items:center;gap:12px;padding:6px 4px 14px}
  .avatar{width:42px;height:42px;border-radius:50%;background:var(--accent-weak);
    display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
  .chathead h1{font-size:1.05rem;margin:0}
  .chathead .sub{color:var(--muted);font-size:.85rem;margin:0}

  /* generic card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;margin:10px 0;box-shadow:0 1px 2px rgba(20,30,45,.04)}
  .card.err{border-color:var(--err);color:var(--err)}
  .card .lead{display:block;font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-bottom:5px}
  .card a{color:var(--accent)}
  .btn{display:inline-block;margin-top:12px;appearance:none;border:0;border-radius:10px;
    background:var(--accent);color:#fff;font:600 15px/1 system-ui;padding:13px 22px;cursor:pointer;text-decoration:none}

  /* pinned teaser card */
  .teaser{background:var(--accent-weak);border-color:#d4e0ff}
  .teaser .tgroup{margin:8px 0 4px}
  .teaser ul{margin:4px 0 6px;padding-left:1.2em}
  .teaser li{margin:.18em 0}
  .teaser .fund{color:var(--muted)}
  .teaser .sch{margin:8px 0 4px}
  .teaser .caveat{color:var(--muted);font-size:.85rem;margin:10px 0 0}

  /* sticky cycling carousel (the wait UI) */
  .carousel{position:sticky;top:14px;display:flex;flex-direction:column;gap:12px}
  /* persistent "working in the background" badge — never rotates away */
  .working{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.82rem}
  .working .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);
    flex:0 0 auto;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  .cslide{min-height:60px;transition:opacity .38s ease}
  .cslide.out{opacity:0}
  .cslide .msg{font-weight:600}
  /* indeterminate progress bar */
  .pbar{position:relative;height:3px;background:var(--accent-weak);border-radius:3px;overflow:hidden}
  .pbar::after{content:"";position:absolute;top:0;bottom:0;left:-35%;width:35%;
    background:var(--accent);border-radius:3px;animation:indet 1.5s ease-in-out infinite}
  @keyframes indet{0%{left:-35%}100%{left:100%}}

  .meta{color:var(--muted);font-size:.8rem;text-align:center;margin-top:16px}

  /* report (replaces the wait UI on completion) */
  .dlbar{margin:4px 0 16px;text-align:right}
  .dlbar .btn{margin-top:0}
  .report{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:24px 26px;margin:6px 0;box-shadow:0 1px 2px rgba(20,30,45,.04)}
  .report h1{font-size:1.5rem;margin:.2em 0 .5em}
  .report h2{font-size:1.2rem;margin:1.3em 0 .4em;border-bottom:1px solid var(--line);padding-bottom:4px}
  .report h3{font-size:1.05rem;margin:1.1em 0 .3em}
  .report p{margin:.6em 0}
  .report ul,.report ol{margin:.5em 0 .8em;padding-left:1.4em}
  .report li{margin:.25em 0}
  .report code{background:#f0f2f5;border-radius:5px;padding:1px 5px;font-size:.92em;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .report blockquote{border-left:3px solid var(--line);margin:.6em 0;padding:.2em 0 .2em 14px;color:var(--muted)}
  .report a{color:var(--accent)}
  .report hr{border:0;border-top:1px solid var(--line);margin:1.4em 0}
  .tablewrap{overflow-x:auto;margin:.8em 0}
  .report table{border-collapse:collapse;width:100%;font-size:.94rem}
  .report th,.report td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
  .report th{background:var(--accent-weak)}
</style>
</head>
<body>
<div class="wrap">
  <div class="chathead">
    <div class="avatar">🎓</div>
    <div>
      <h1>Your Scholar advisor</h1>
      <p class="sub" id="sub">Putting your study-abroad plan together…</p>
    </div>
  </div>
  <div id="teaser"></div>
  <div id="stage"></div>
  <div class="meta" id="meta"></div>
</div>
<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  var parts = location.pathname.split('/').filter(Boolean); // clients / <slug> / results
  var slug = parts[1];
  var pollTimer = null;

  // ===== markdown renderer (used for the final report) =====
  function esc(s){ return String(s).replace(/[&<>]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
  function inline(s){
    s = esc(s);
    s = s.replace(/`([^`]+)`/g, function(_,c){ return '<code>'+c+'</code>'; });
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return s;
  }
  function renderTable(rows){
    function cells(line){
      return line.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(function(c){return c.trim();});
    }
    var head = cells(rows[0]);
    var out = '<div class="tablewrap"><table><thead><tr>';
    head.forEach(function(h){ out += '<th>'+inline(h)+'</th>'; });
    out += '</tr></thead><tbody>';
    for(var i=2;i<rows.length;i++){
      out += '<tr>';
      cells(rows[i]).forEach(function(c){ out += '<td>'+inline(c)+'</td>'; });
      out += '</tr>';
    }
    return out + '</tbody></table></div>';
  }
  function md(text){
    var lines = text.replace(/\r\n/g,'\n').split('\n');
    var out = [], i = 0;
    function isTableSep(l){ return /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(l) && /-/.test(l); }
    while(i < lines.length){
      var line = lines[i];
      if(/^\s*$/.test(line)){ i++; continue; }
      if(/^\s*\|.*\|\s*$/.test(line) && i+1 < lines.length && isTableSep(lines[i+1])){
        var tbl = [line, lines[i+1]]; i += 2;
        while(i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ tbl.push(lines[i]); i++; }
        out.push(renderTable(tbl)); continue;
      }
      var h = line.match(/^(#{1,4})\s+(.*)$/);
      if(h){ out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>'); i++; continue; }
      if(/^\s*(---|\*\*\*|___)\s*$/.test(line)){ out.push('<hr>'); i++; continue; }
      if(/^\s*>\s?/.test(line)){
        var bq = [];
        while(i < lines.length && /^\s*>\s?/.test(lines[i])){ bq.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
        out.push('<blockquote>'+inline(bq.join(' '))+'</blockquote>'); continue;
      }
      if(/^\s*[-*+]\s+/.test(line)){
        var ul = [];
        while(i < lines.length && /^\s*[-*+]\s+/.test(lines[i])){ ul.push(inline(lines[i].replace(/^\s*[-*+]\s+/,''))); i++; }
        out.push('<ul>'+ul.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul>'); continue;
      }
      if(/^\s*\d+\.\s+/.test(line)){
        var ol = [];
        while(i < lines.length && /^\s*\d+\.\s+/.test(lines[i])){ ol.push(inline(lines[i].replace(/^\s*\d+\.\s+/,''))); i++; }
        out.push('<ol>'+ol.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ol>'); continue;
      }
      var para = [line]; i++;
      while(i < lines.length && !/^\s*$/.test(lines[i]) &&
            !/^\s*(#{1,4}\s|[-*+]\s|\d+\.\s|>|\|)/.test(lines[i])){ para.push(lines[i]); i++; }
      out.push('<p>'+inline(para.join(' '))+'</p>');
    }
    return out.join('\n');
  }

  // ===== pinned teaser card ("first results") =====
  var teaserShown = false;
  function renderTeaser(data){
    if(teaserShown || !data) return;
    var unis = data.universities || {};
    var sch = data.scholarships || [];
    var countries = Object.keys(unis);
    if(!countries.length && !sch.length) return;   // nothing matched — stay silent
    teaserShown = true;
    var html = '<span class="lead">Early matches from our knowledge base</span>';
    countries.forEach(function(country){
      html += '<div class="tgroup"><strong>'+esc(country)+' universities that fit your field</strong><ul>';
      unis[country].forEach(function(u){
        var fund = u.funds_intl ? 'funds intl' : 'scholarship-route funding';
        html += '<li>'+esc(u.university)+' — entry: '+esc(u.entry)+
                ' <span class="fund">('+fund+')</span></li>';
      });
      html += '</ul></div>';
    });
    if(sch.length){
      html += '<p class="sch"><strong>Scholarships you may be eligible for:</strong> '+
              sch.map(esc).join(', ')+'.</p>';
    }
    html += '<p class="caveat">This is a quick preview from our knowledge base — your full plan '+
            'will rank these by your admission odds and funding fit, with sources for every figure.</p>';
    var card = $('teaser');
    card.className = 'card teaser';
    card.innerHTML = html;
  }

  // ===== scripted carousel content (no LLM calls) =====
  var PROGRESS = [
    'Mapping your grades onto the UK / US scale…',
    'Shortlisting universities that actually offer your field at your level…',
    'Scoring each school by admission odds × funding for international students…',
    'Finding scholarships you’re genuinely eligible for (nationality, level, field)…',
    'Sanity-checking deadlines, tests, and visa timelines…',
    'Writing up your personalised plan with sources for every figure…'
  ];
  var TIPS = [
    'UK master’s schools rarely fund international students directly — a portable award like **Chevening** or **Commonwealth** is usually the real route to full funding.',
    'For US **PhDs**, funding is the norm: most STEM doctoral offers include a full tuition waiver + stipend, regardless of nationality.',
    'A US **master’s** is usually self-funded for internationals — plan for limited aid and chase assistantships once enrolled.',
    '**Chevening** asks you to apply to 3 UK courses and hold an offer — start your university applications early, in parallel.',
    '**GREAT Scholarships** eligibility is set per-university each year — always check the specific school’s current country list.',
    'Need-blind admission for internationals is rare in the US — only a handful (MIT, Princeton, Yale, Harvard, Amherst) admit without regard to ability to pay and meet full need.',
    'UK admissions are requirement-based: hitting the entry grade (often a **2:1**) matters more than any “acceptance rate”.',
    'Build a balanced list — a mix of reach, target, and safety. Applying only to ultra-selective schools is the most common mistake.',
    'Sit your English test (IELTS/TOEFL) early — many scholarships need the score *before* their deadline.',
    'Line up transcripts and reference letters months ahead — they’re the slowest part of any application.',
    'Some government awards carry a return-home or service bond (e.g. GETFund) — check this if you hope to stay abroad afterwards.',
    'For Commonwealth scholarships you usually apply through a **Nominating Agency** in your country, not directly — find yours early.',
    'Apply for your student visa as soon as you have an unconditional offer + confirmed funding — slots get tight near intake.',
    'A school that admits you but won’t fund internationals is a weaker bet than a harder school that funds fully — that’s why we rank on funding too.',
    'Mastercard Foundation Scholars fully funds African students at partner universities — worth a look if you’re from Ghana or Nigeria.'
  ];

  // Interleave progress + tips; cycle tips so the carousel never runs dry on a long run.
  var queue = [];
  (function(){
    var ti = 0;
    for(var p=0; p<PROGRESS.length; p++){
      queue.push({cls:'progress', html: inline(PROGRESS[p])});
      if(ti < TIPS.length){ queue.push({lead:'While you wait', html: inline(TIPS[ti++])}); }
    }
    while(ti < TIPS.length){ queue.push({lead:'While you wait', html: inline(TIPS[ti++])}); }
  })();
  var qi = 0, tipCycle = 0;
  function nextItem(){
    if(qi < queue.length) return queue[qi++];
    return {lead:'While you wait', html: inline(TIPS[(tipCycle++) % TIPS.length])};
  }

  // ===== sticky carousel (the wait UI), lives in #stage =====
  var carouselTimer = null, slideEl = null, running = false;
  var WORKING_DEFAULT = 'Researching your plan in the background — this usually takes a few minutes';
  function setWorking(text){ var el = $('wlabel'); if(el) el.textContent = text; }
  function slideHTML(it){
    return (it.lead ? '<span class="lead">'+it.lead+'</span>' : '') + '<div class="msg">'+it.html+'</div>';
  }
  function startCarousel(){
    if(running) return; running = true;
    var stage = $('stage');
    stage.innerHTML = '';
    var card = document.createElement('div');
    card.className = 'card carousel';
    var work = document.createElement('div');
    work.className = 'working';
    work.innerHTML = '<span class="dot"></span><span class="wlabel" id="wlabel">' +
      WORKING_DEFAULT + '</span>';
    slideEl = document.createElement('div');
    slideEl.className = 'cslide';
    slideEl.innerHTML = slideHTML(nextItem());   // first item, no fade
    var pbar = document.createElement('div');
    pbar.className = 'pbar';
    card.appendChild(work);
    card.appendChild(slideEl);
    card.appendChild(pbar);
    stage.appendChild(card);
    carouselTimer = setInterval(function(){
      var it = nextItem();
      slideEl.classList.add('out');
      setTimeout(function(){
        if(!slideEl) return;
        slideEl.innerHTML = slideHTML(it);
        slideEl.classList.remove('out');
      }, 380);
    }, 7500);
  }
  function clearStage(){
    running = false;
    if(carouselTimer){ clearInterval(carouselTimer); carouselTimer = null; }
    slideEl = null;
    $('stage').innerHTML = '';
  }

  // ===== terminal stage renderers =====
  function showCTA(message){
    clearStage();
    var c = document.createElement('div');
    c.className = 'card';
    c.innerHTML = inline(message) +
      '<div><a class="btn" href="/clients/'+slug+'/questions">Answer the questions →</a></div>';
    $('stage').appendChild(c);
  }
  function showError(message){
    clearStage();
    var c = document.createElement('div');
    c.className = 'card err';
    c.innerHTML = inline(message);
    $('stage').appendChild(c);
  }
  var reportShown = false;
  function showReport(markdown){
    if(reportShown) return; reportShown = true;
    clearStage();
    $('teaser').className = ''; $('teaser').innerHTML = '';   // report supersedes the teaser
    $('sub').textContent = 'Your plan is ready.';
    var done = document.createElement('div');
    done.className = 'card';
    done.innerHTML = '🎉 <strong>Your personalised study-abroad plan is ready.</strong> ' +
      'Every figure is cited, and you can download it as a Word document.';
    $('stage').appendChild(done);
    var card = document.createElement('div');
    card.className = 'report';
    card.innerHTML = '<div class="dlbar"><a class="btn" href="/api/clients/'+slug+
      '/report.docx">⬇ Download as Word document (.docx)</a></div>' + md(markdown);
    $('stage').appendChild(card);
  }

  // ===== poll the real status and drive the stage =====
  var ctaShown = false, saidApproval = false;
  function poll(){
    fetch('/api/clients/' + slug + '/status').then(function(r){
      if(!r.ok) throw new Error('status unavailable'); return r.json();
    }).then(function(st){
      if(typeof st.cost_usd === 'number'){ $('meta').textContent = 'run cost so far: $' + st.cost_usd.toFixed(2); }
      switch(st.state){
        case 'queued':
        case 'running_intake':
          $('sub').textContent = st.message || 'Reviewing your answers and mapping your grades…';
          startCarousel();
          setWorking('Reviewing your answers in the background — this usually takes a few minutes');
          break;
        case 'awaiting_answers':
          $('sub').textContent = 'A couple of quick questions to sharpen your search.';
          if(!ctaShown){
            ctaShown = true;
            showCTA(st.message || 'A couple of quick questions to sharpen your search.');
          }
          break;
        case 'running_research':
          $('sub').textContent = 'Putting your study-abroad plan together…';
          startCarousel();
          setWorking(WORKING_DEFAULT);
          break;
        case 'awaiting_approval':
          $('sub').textContent = st.message || 'Almost there — your plan is being reviewed before release.';
          saidApproval = true;
          startCarousel();   // keep the carousel lively through the review wait
          setWorking('Finalising — your plan is under review before release');
          break;
        case 'done':
          fetch('/api/clients/' + slug + '/report').then(function(r){
            if(!r.ok) throw new Error('report not ready'); return r.json();
          }).then(function(j){ showReport(j.markdown); if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } })
          .catch(function(){ /* report not flushed yet; keep polling */ });
          break;
        case 'error':
          if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
          $('sub').textContent = 'Something went wrong.';
          showError(st.message || st.error || 'Something went wrong. Please contact us and we’ll look into it.');
          break;
        default:
          startCarousel();
      }
    }).catch(function(e){
      if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
      $('sub').textContent = 'We couldn’t find this request.';
      showError('We can’t find this request: ' + e.message);
    });
  }

  // instant teaser ("first results"): one local KB lookup, swallow any failure
  fetch('/api/clients/' + slug + '/teaser')
    .then(function(r){ return r.ok ? r.json() : {}; })
    .then(renderTeaser)
    .catch(function(){});

  poll();
  pollTimer = setInterval(poll, 4000);
})();
</script>
</body>
</html>
